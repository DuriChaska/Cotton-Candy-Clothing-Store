<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cotton Candy Clothing Store - Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="header"></div>

  <section class="checkout-section">
    <nav class="breadcrumb">
      <a href="carrito.html">Carrito</a> / <a href="#">Envío</a> / <a href="#">Pago</a>
    </nav>

    <div class="checkout-form">

      <!-- Datos de facturación -->
      <div class="billing-details">
        <h2>Datos de Facturación</h2>
        <div class="input-group">
          <input type="text" placeholder="Primer Nombre *" />
          <input type="text" placeholder="Apellido" />
        </div>
        <select>
          <option>País</option>
        </select>
        <input type="text" placeholder="Calle *" />
        <div class="input-group">
          <input type="text" placeholder="Ciudad *" />
          <select>
            <option>Estado *</option>
          </select>
        </div>
        <div class="input-group">
          <input type="text" placeholder="Código Postal *" />
          <input type="text" placeholder="Celular *" />
        </div>
        <input type="email" placeholder="Email" />
        <textarea placeholder="Referencias"></textarea>

        <div class="checkout-navigation">
          <a href="carrito.html" class="back-to-cart">← REGRESAR AL CARRITO</a>
          <button class="continue-payment">CONTINUAR A PAGAR →</button>
        </div>
      </div>

      <!-- Resumen del pedido -->
      <aside class="payment-summary">
        <h3>Producto</h3>
        <ul class="order-products">
          <li>
            <span>Playera con estampado antiguo</span>
            <span>$400.00</span>
          </li>
          <li>
            <span>Playera estampada Travis Scott</span>
            <span>$399.00</span>
          </li>
          <li>
            <span>Playera con estampado de astronauta</span>
            <span>$400.00</span>
          </li>
        </ul>
        <div class="order-totals">
          <div><strong>Subtotal</strong><span>$1199.00</span></div>
          <div><strong>Envío</strong><span>$120.00</span></div>
          <div class="total"><strong>Total</strong><span>$1319.00</span></div>
        </div>

        <div class="payment-method">
          <h3>Pagar</h3>
          <label>
            <input type="radio" name="payment" checked />
            <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" alt="PayPal" class="paypal-logo" />
            PayPal
          </label>
          <input type="email" placeholder="Ingrese su correo electrónico o número de celular" />
          <button type="button">SIGUIENTE</button>
        </div>
      </aside>

    </div>
  </section>

  <div id="footer"></div>

  <script src="components.js"></script>
</body>
</html>
