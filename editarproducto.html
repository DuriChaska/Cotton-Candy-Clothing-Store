<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto - Cotton Candy Clothing Store</title>

<style>

body{
font-family:'Arial',sans-serif;
background-color:#fdf5f8;
margin:0;
padding:0;
}

/* HEADER */
header{
background-color:#ffc2cb;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#333;
position:fixed;
width:100%;
top:0;
left:0;
z-index:1000;
}

/* CONTENEDOR */
.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
background-color:#f8d4e6;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.1);
position:fixed;
top:64px;   /* altura real del header */
left:0;
bottom:0;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
margin-bottom:20px;
}

.sidebar ul li a{
color:#333;
font-weight:600;
text-decoration:none;
font-size:16px;
}

.sidebar ul li a:hover{
color:#b3488f;
}

/* CONTENIDO */
.main-content{
margin-left:250px;
padding:20px;
padding-top:100px; /* separa contenido del header */
width:100%;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:15px;
text-align:center;
border:1px solid #ddd;
}

th{
background-color:#f8d4e6;
font-weight:bold;
}

td img{
width:80px;
height:auto;
}

.action-buttons{
display:flex;
gap:10px;
justify-content:center;
}

.btn-editar{
background-color:#f5d35e;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
text-decoration:none;
color:white;
}

.btn-editar:hover{
background-color:#e2c34a;
}

.btn-eliminar{
background-color:#f35a5a;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
color:white;
}

.btn-eliminar:hover{
background-color:#e24e4e;
}

.btn-agregar{
background-color:#f5d35e;
padding:10px 20px;
border-radius:5px;
font-weight:bold;
color:white;
cursor:pointer;
text-decoration:none;
}

.btn-agregar:hover{
background-color:#e2c34a;
}

</style>
</head>

<body>

<header>
Cotton Candy Clothing Store - Productos
</header>

<div class="container">

<div class="sidebar">
<ul>
<li><a href="editarproducto.html">Productos</a></li>
<li><a href="pedidos.html">Pedidos</a></li>
<li><a href="promociones.html">Promociones</a></li>
</ul>
</div>

<div class="main-content">

<div style="text-align:right;margin-bottom:20px;">
<a href="Interfaz Vendedor.html" class="btn-agregar">Agregar Producto</a>
</div>

<table>

<thead>
<tr>
<th>Fotografía</th>
<th>Descripción</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="productos-lista"></tbody>

</table>

</div>
</div>

<script>

const productos = [
 { id: "blusa-amarilla-cruzada", nombre: "Blusa amarilla cruzada (manga larga)", precio: 399, precioFormatted: "$399 MXN", imagen: "Imagenes/PLAYERA ESTAMPADA TRAVIS SCOTT.png" },
            { id: "top-vino-acampanado", nombre: "Top vino manga larga acampanada", precio: 389, precioFormatted: "$389 MXN", imagen: "Imagenes/SUDADERA ESTAMPADA.png" },
            { id: "top-rojo-tirantes", nombre: "Top rojo con tirantes", precio: 299, precioFormatted: "$299 MXN", imagen: "Imagenes/Playera estampada jesus.png" },
            { id: "top-rosa-mono", nombre: "Top rosa con moño", precio: 249, precioFormatted: "$249 MXN", imagen: "Imagenes/Playera estampada con flores.png" },
            { id: "top-rosa-strapless", nombre: "Top rosa strapless", precio: 269, precioFormatted: "$269 MXN", imagen: "Imagenes/Playera de bruja feminista.png" },
            { id: "top-amarillo-tirantes", nombre: "Top amarillo con tirantes finos", precio: 289, precioFormatted: "$289 MXN", imagen: "Imagenes/Playera Return of Misfits.png" },
            { id: "top-rosa-manga-larga", nombre: "Top rosa manga larga", precio: 319, precioFormatted: "$319 MXN", imagen: "Imagenes/Playera de manga corta para hombre.png" },
            { id: "top-halter-brillante", nombre: "Top brillante cuello halter", precio: 349, precioFormatted: "$349 MXN", imagen: "Imagenes/Playera Estampada Gatos.png" },
            { id: "blusa-blanca-vuelo", nombre: "Blusa blanca con tirantes y vuelo", precio: 379, precioFormatted: "$379 MXN", imagen: "Imagenes/playera estampada persona.png" }
];

const lista=document.getElementById("productos-lista");

productos.forEach(p=>{

const fila=document.createElement("tr");

fila.innerHTML=`
<td><img src="${p.imagen}"></td>
<td>${p.nombre}</td>
<td>${p.precio}</td>
<td class="action-buttons">
<a href="Interfaz-Editar.html" class="btn-editar">Editar</a>
<span class="btn-eliminar">x</span>
</td>
`;

lista.appendChild(fila);

});

</script>

</body>
</html>
