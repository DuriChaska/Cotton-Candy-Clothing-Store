<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subastas - Cotton Candy Clothing Store</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auction-box {
      background: #fff;
      border-radius: 15px;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .auction-img {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .timer {
      font-size: 18px;
      font-weight: bold;
      color: #e74c3c;
      margin: 10px 0;
    }

    .offer-input {
      width: 80%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .offer-button {
      background-color: #f7c948;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .offer-button:hover {
      background-color: #f4b400;
    }

    .offer-button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .offers-list {
      margin-top: 20px;
      text-align: left;
    }

    .offer-item {
      background: #f3e8ff;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div id="header"></div>

  <div class="container">
    <h1 class="section-title">Subasta</h1>
    <p class="section-subtitle">Participa en nuestra subasta exclusiva</p>

    <div class="auction-box">
      <img src="Imagenes/sudaderajk.png" alt="Foto de perfil" class="profile-pic" />

      <h2>Sudadera edición limitada</h2>
      <p>Precio actual: <strong id="precioActual">$250 MXN</strong></p>

      <!-- Temporizador funcional -->
      <div class="timer" id="timer">Tiempo restante: 00:10:00</div>

      <input type="number" id="offerInput" class="offer-input" placeholder="Ingresa tu oferta" />
      <br />
      <button class="offer-button" id="offerBtn" onclick="hacerOferta()">Ofertar</button>

      <p id="mensajeOferta" style="margin-top:10px; font-weight:bold;"></p>

      <div class="offers-list" id="offersList">
        <h3>Ofertas recientes</h3>
        <div class="offer-item">Usuario1: $200</div>
        <div class="offer-item">Usuario2: $220</div>
        <div class="offer-item">Usuario3: $250</div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="components.js"></script>
  <script>
    // ⏱️ TIEMPO INICIAL (10 minutos)
    let tiempoRestante = 600; // segundos

    function actualizarTimer() {
      const timer = document.getElementById("timer");
      const btn = document.getElementById("offerBtn");

      let minutos = Math.floor(tiempoRestante / 60);
      let segundos = tiempoRestante % 60;

      minutos = minutos < 10 ? "0" + minutos : minutos;
      segundos = segundos < 10 ? "0" + segundos : segundos;

      timer.textContent = `Tiempo restante: ${minutos}:${segundos}`;

      if (tiempoRestante <= 0) {
        clearInterval(intervalo);
        timer.textContent = "Subasta finalizada";
        btn.disabled = true;
      }

      tiempoRestante--;
    }

    const intervalo = setInterval(actualizarTimer, 1000);

    function hacerOferta() {
      const input = document.getElementById("offerInput");
      const valor = input.value.trim();
      const mensaje = document.getElementById("mensajeOferta");
      const lista = document.getElementById("offersList");

      if (!valor) {
        alert("Ingresa una oferta válida");
        return;
      }

      mensaje.textContent = "Oferta registrada";

      const nuevaOferta = document.createElement("div");
      nuevaOferta.classList.add("offer-item");
      nuevaOferta.textContent = "Tú: $" + valor;

      lista.appendChild(nuevaOferta);

      input.value = "";
    }
  </script>

</body>
</html>
