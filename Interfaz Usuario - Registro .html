<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cotton Candy Clothing Store - Registro Usuario</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="header"></div>

  <section class="client-interface registration">
    <h2>Registro Usuario</h2>
    <form class="registration-form" id="registerForm">
      <div class="input-group">
        <input type="text" placeholder="Nombre" />
        <input type="text" placeholder="Apellidos" />
      </div>
      <input type="email" placeholder="Correo" />
      <input type="password" placeholder="Contraseña" />
      <input type="password" placeholder="Confirmar Contraseña" />
      <button type="submit">REGISTRARSE</button>
      <p id="registerMessage" style="display:none; color:#054704; margin-top:15px;">
        Registro exitoso. Redirigiendo al inicio de sesión...
      </p>
    </form>
  </section>

  <div id="footer"></div>

  <script src="components.js"></script>
  <script src="registro.js"></script>
</body>
</html>
